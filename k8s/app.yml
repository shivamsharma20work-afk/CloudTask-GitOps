apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudtask-app 
  namespace: argocd
spec:
  project: default

  source: 
    repoURL: https://github.com/shivamsharma20work-afk/CloudTask-GitOps.git
    targetRevision: HEAD
    path: k8s

  destination: 
    server: https://kubernetes.default.svc 
    namespace: cloudtask
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace= true